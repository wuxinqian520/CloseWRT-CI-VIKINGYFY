#云编译公用核心
name: WRT-CORE

on:
  workflow_call:
    inputs:
      WRT_CONFIG:
        required: true
        type: string
      WRT_CONFIG_FILE:
        required: false
        type: string
      WRT_THEME:
        required: true
        type: string
      WRT_NAME:
        required: true
        type: string
      WRT_SSID:
        required: true
        type: string
      WRT_WORD:
        required: true
        type: string
      WRT_IP:
        required: true
        type: string
      WRT_PW:
        required: true
        type: string
      WRT_REPO:
        required: true
        type: string
      WRT_BRANCH:
        required: true
        type: string
      WRT_SOURCE:
        required: true
        type: string
      WRT_PACKAGE:
        required: false
        type: string
      WRT_GFW:
        required: false
        type: boolean
        default: false
      WRT_USB:
        required: false
        type: boolean
        default: false
      WRT_MMC:
        required: false
        type: boolean
        default: false
      WRT_TEST:
        required: false
        type: boolean
        default: false

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  WRT_CONFIG: ${{inputs.WRT_CONFIG}}
  WRT_CONFIG_FILE: ${{inputs.WRT_CONFIG_FILE}}
  WRT_THEME: ${{inputs.WRT_THEME}}
  WRT_NAME: ${{inputs.WRT_NAME}}
  WRT_SSID: ${{inputs.WRT_SSID}}
  WRT_WORD: ${{inputs.WRT_WORD}}
  WRT_IP: ${{inputs.WRT_IP}}
  WRT_PW: ${{inputs.WRT_PW}}
  WRT_REPO: ${{inputs.WRT_REPO}}
  WRT_BRANCH: ${{inputs.WRT_BRANCH}}
  WRT_SOURCE: ${{inputs.WRT_SOURCE}}
  WRT_PACKAGE: ${{inputs.WRT_PACKAGE}}
  WRT_GFW: ${{inputs.WRT_GFW}}
  WRT_USB: ${{inputs.WRT_USB}}
  WRT_MMC: ${{inputs.WRT_MMC}}
  WRT_TEST: ${{inputs.WRT_TEST}}

jobs:
  core:
    name: ${{inputs.WRT_SOURCE}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Projects
        uses: actions/checkout@main

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq purge firefox
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"

          sudo mkdir -p /mnt/build_wrt
          sudo chown $USER:$USER /mnt/build_wrt
          sudo ln -s /mnt/build_wrt $GITHUB_WORKSPACE/wrt

      - name: Initialization Values
        run: |
          if [ -z "$WRT_CONFIG_FILE" ]; then
            WRT_CONFIG_FILE="$WRT_CONFIG.txt"
          fi

          WRT_GFW=$(echo "${WRT_GFW:-false}" | tr '[:upper:]' '[:lower:]')
          WRT_USB=$(echo "${WRT_USB:-false}" | tr '[:upper:]' '[:lower:]')
          WRT_MMC=$(echo "${WRT_MMC:-false}" | tr '[:upper:]' '[:lower:]')
          WRT_TEST=$(echo "${WRT_TEST:-false}" | tr '[:upper:]' '[:lower:]')

          if [ ! -f "./Config/$WRT_CONFIG_FILE" ]; then
            echo "Config file not found: ./Config/$WRT_CONFIG_FILE"
            exit 1
          fi

          echo "WRT_CONFIG_FILE=$WRT_CONFIG_FILE" >> $GITHUB_ENV
          echo "WRT_GFW=$WRT_GFW" >> $GITHUB_ENV
          echo "WRT_USB=$WRT_USB" >> $GITHUB_ENV
          echo "WRT_MMC=$WRT_MMC" >> $GITHUB_ENV
          echo "WRT_TEST=$WRT_TEST" >> $GITHUB_ENV
          echo "WRT_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV
          echo "WRT_MARK=${GITHUB_REPOSITORY%%/*}" >> $GITHUB_ENV
          echo "WRT_INFO=${WRT_SOURCE%%/*}" >> $GITHUB_ENV
          echo "WRT_TARGET=$(grep -m 1 -oP '^CONFIG_TARGET_\K[\w]+(?=\=y)' ./Config/$WRT_CONFIG_FILE)" >> $GITHUB_ENV
          echo "WRT_WIFI=wifi-yes" >> $GITHUB_ENV
          echo "WRT_KVER=none" >> $GITHUB_ENV
          echo "WRT_LIST=none" >> $GITHUB_ENV

      - name: Clone Code
        run: |
          git clone --depth=1 --single-branch --branch $WRT_BRANCH $WRT_REPO ./wrt/

          cd ./wrt/ && echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

          # 如果不存在 defconfig 则直接结束工作流
          if [ ! -d "defconfig" ]; then
            echo "defconfig directory not found, stopping workflow."
            exit 0
          fi

          # GitHub Action 移除国内下载源
          PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
          if [ -f "$PROJECT_MIRRORS_FILE" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
          fi

      - name: Check Scripts
        run: |
          find ./ -maxdepth 3 -type f -iregex ".*\(txt\|sh\)$" -exec dos2unix {} \; -exec chmod +x {} \;

      - name: Check Caches
        id: check-cache
        if: env.WRT_TEST != 'true'
        uses: actions/cache@main
        with:
          key: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_HASH}}
          restore-keys: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}
          path: |
            ./wrt/.ccache
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Update Caches
        if: env.WRT_TEST != 'true'
        run: |
          if [ -d "./wrt/staging_dir" ]; then
            find "./wrt/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r DIR; do
              find "$DIR" -type f -exec touch {} +
            done

            mkdir -p ./wrt/tmp && echo "1" > ./wrt/tmp/.build

            echo "toolchain skiped done!"
          else
            echo "caches missed!"
          fi

          if ${{steps.check-cache.outputs.cache-hit != 'true'}}; then
            CACHE_LIST=$(gh cache list --key "$WRT_CONFIG-$WRT_INFO" | cut -f 1)
            for CACHE_KEY in $CACHE_LIST; do
              gh cache delete $CACHE_KEY
            done

            echo "caches cleanup done!"
          fi

      - name: Update Feeds
        run: |
          cd ./wrt/

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Custom Packages
        run: |
          cd ./wrt/package/

          is_true() {
            case "${1,,}" in
              1|true|yes|on) return 0 ;;
              *) return 1 ;;
            esac
          }

          $GITHUB_WORKSPACE/Scripts/Packages.sh

          if is_true "$WRT_GFW"; then
            $GITHUB_WORKSPACE/Scripts/Gfw.sh
            echo "Custom gfw packages added!"
          fi

          if is_true "$WRT_USB" || is_true "$WRT_MMC"; then
            $GITHUB_WORKSPACE/Scripts/Disk.sh
            echo "Custom disk packages added!"
          fi

          $GITHUB_WORKSPACE/Scripts/Handles.sh

      - name: Custom Settings
        run: |
          cd ./wrt/

          is_true() {
            case "${1,,}" in
              1|true|yes|on) return 0 ;;
              *) return 1 ;;
            esac
          }

          if [[ "${WRT_CONFIG,,}" == *"test"* ]]; then
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG_FILE >> .config
          else
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG_FILE $GITHUB_WORKSPACE/Config/GENERAL.txt >> .config
          fi

          ADD_DISK_CONFIG=false

          echo "WRT_GFW=$WRT_GFW"

          if is_true "$WRT_GFW"; then
            echo "Checking luci-app-homeproxy availability in feeds..."
            ./scripts/feeds search luci-app-homeproxy || true
          fi

          if is_true "$WRT_GFW"; then
            printf '\nCONFIG_PACKAGE_luci-app-homeproxy=y\n' >> .config
          fi

          if is_true "$WRT_USB"; then
            cat $GITHUB_WORKSPACE/Config/USB.txt >> .config
            ADD_DISK_CONFIG=true
          fi

          if is_true "$WRT_MMC"; then
            echo "CONFIG_PACKAGE_mmc-utils=y" >> .config
            ADD_DISK_CONFIG=true
          fi

          if [[ "$ADD_DISK_CONFIG" == "true" ]]; then
            cat $GITHUB_WORKSPACE/Config/DISK.txt >> .config
          fi

          echo "homeproxy config (before Settings.sh):"
          grep -n "CONFIG_PACKAGE_luci-app-homeproxy" .config || true

          $GITHUB_WORKSPACE/Scripts/Settings.sh

          echo "homeproxy config (after Settings.sh, before defconfig):"
          grep -n "CONFIG_PACKAGE_luci-app-homeproxy" .config || true

          make defconfig -j$(nproc) && make clean -j$(nproc)

          echo "homeproxy config (after defconfig):"
          grep -n "CONFIG_PACKAGE_luci-app-homeproxy" .config || true

      - name: Download Packages
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          make download -j$(nproc)

      - name: Compile Firmware
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          make -j$(nproc) || make -j1 V=s

      - name: Machine Information
        run: |
          cd ./wrt/

          echo "======================="
          lscpu | grep -E "name|Core|Thread"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1
          echo "======================="

      - name: Package Firmware
        run: |
          cd ./wrt/ && mkdir ./upload/

          cp -f ./.config ./upload/Config-"$WRT_CONFIG"-"$WRT_INFO"-"$WRT_BRANCH"-"$WRT_DATE".txt

          if [[ $WRT_TEST != 'true' ]]; then
            echo "WRT_KVER=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^kernel - \K[\d\.]+' {} \;)" >> $GITHUB_ENV
            echo "WRT_LIST=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^luci-(app|theme)[^ ]*' {} \; | tr '\n' ' ')" >> $GITHUB_ENV

            find ./bin/targets/ -iregex ".*\(buildinfo\|json\|sha256sums\|packages\)$" -exec rm -rf {} +

            for FILE in $(find ./bin/targets/ -type f -iname "*$WRT_TARGET*") ; do
              EXT=$(basename $FILE | cut -d '.' -f 2-)
              NAME=$(basename $FILE | cut -d '.' -f 1 | grep -io "\($WRT_TARGET\).*")
              NEW_FILE="$WRT_INFO"-"$WRT_BRANCH"-"$WRT_WIFI"-"$NAME"-"$WRT_DATE"."$EXT"
              mv -f $FILE ./upload/$NEW_FILE
            done

            find ./bin/targets/ -type f -exec mv -f {} ./upload/ \;

            make clean -j$(nproc)
          fi

      - name: Release Firmware
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_BRANCH}}-${{env.WRT_DATE}}
          files: ./wrt/upload/*.*
          body: |
            源码：${{env.WRT_REPO}}
            分支：${{env.WRT_BRANCH}}
            提交：${{env.WRT_HASH}}

            配置：${{env.WRT_CONFIG}}
            平台：${{env.WRT_TARGET}}

            登录地址：${{env.WRT_IP}}
            登录密码：${{env.WRT_PW}}

            WIFI名称：${{env.WRT_SSID}}
            WIFI密码：${{env.WRT_WORD}}

            内核版本：${{env.WRT_KVER}}
            插件列表：${{env.WRT_LIST}}
